Variables:

  com:
    axonivy:
      connector:
        sftp:
          server:
            dummy:
              # The host name to the SFTP server
              host: ''
              
              # The port number to the SFTP server
              port: 22
          
              # The username to the SFTP server
              username: ''
              
              # Auth type to the SFPT server
              # [enum: password, ssh]
              auth: 'password'
              
              # The password to the SFTP server
              # [password]
              password: ''
              
              # Dear Bug Hunter
              # This credential is intentionally included for educational purposes only and does not provide access to any production systems
              # Please do not submit it as part of our bug bounty program
              # The path of ssh key file to SFTP server
              sshkeyFilePath: ''
              
              # The ssh key passphrase
              sshPassphraseSecret: ''
              # Defines the root directory for all local file operations and acts as a security boundary.
              # All user-provided paths are resolved relative to this directory and prevented from escaping it (path traversal protection).
              # Make sure to configure it as an absolute, normalized directory with proper permissions,
              # and restrict it to a dedicated folder (e.g. not a system or shared directory).
              baseLocalDir: ""
              # Enables basic path restriction checks for file operations.
              # When enabled, local file paths will be normalized and validated to ensure
              # they do not escape the configured base directory (if provided).
              # ⚠️ This does not provide full protection against all path traversal techniques.
              # It is intended to reduce the risk of unintended file access when handling
              # untrusted or dynamic input.
              # Default: true
              enforcePathRestrictions: "true"
              # SSH Host Key Verification (SECURITY CRITICAL)
              # "yes" = Verify server's host key against known_hosts (RECOMMENDED for production)
              # "no"  = Accept any host key (vulnerable to man-in-the-middle attacks)
              # Set to "yes" and configure a known_hosts file for secure deployments
              strictHostKeyChecking: yes
